<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Input Types</title>
</head>
<body>
    <form name="testParsingForm" action="/form" method="post">
        <label for="text">Text:</label><br>
        <input type="text" id="text" name="text"><br><br>
        
        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"><br><br>
        
        <label for="number">Number:</label><br>
        <input type="number" id="number" name="number"><br><br>
        
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"><br><br>
        
        <label for="date">Date:</label><br>
        <input type="date" id="date" name="date"><br><br>
        
        <label for="checkbox">Checkbox:</label><br>
        <input type="checkbox" id="checkbox" name="checkbox" value="checkbox"><br><br>
        
        <label for="radio1">Radio 1:</label><br>
        <input type="radio" id="radio1" name="radio" value="radio1"><br><br>
        
        <label for="radio2">Radio 2:</label><br>
        <input type="radio" id="radio2" name="radio" value="radio2"><br><br>
        
        <label for="file">File:</label><br>
        <input type="file" id="file" name="file"><br><br>
        
        <label for="color">Color:</label><br>
        <input type="color" id="color" name="color"><br><br>
        
        <label for="range">Range:</label><br>
        <input type="range" id="range" name="range"><br><br>
        
<!--         <label for="submit">Submit:</label><br>
        <input type="submit" id="submit" name="submit" value="Submit"><br><br>
 -->        
        <label for="reset">Reset:</label><br>
        <input type="reset" id="reset" name="reset" value="Reset"><br><br>
        
        <label for="button">Button:</label><br>
        <button type="button" id="button" name="button">Click me</button><br><br>
        
        <label for="textarea">Textarea:</label><br>
        <textarea id="textarea" name="textarea"></textarea><br><br>
        
        <label for="select">Select:</label><br>
        <select id="select" name="select">
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>
        </select><br><br>
        
        <label for="datalist">Datalist:</label><br>
        <input list="datalist" id="input-datalist" name="input-datalist">
        <datalist id="datalist">
            <option value="Option 1">
            <option value="Option 2">
            <option value="Option 3">
        </datalist><br><br>
        
        <label for="hidden">Hidden:</label><br>
        <input type="hidden" id="hidden" name="hidden" value="hidden"><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
