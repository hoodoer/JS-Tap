<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>BEX Conductor</h1>

    <div class="section proxy-section">
      <h2>Routing Mode</h2>
      <div class="proxy-toggle-row">
        <label class="toggle-label">
          <input type="checkbox" id="proxyToggle">
          <span class="toggle-text" id="proxyModeLabel">Ticket Mode (your IP)</span>
        </label>
      </div>
      <div class="proxy-fields" id="proxyFields">
        <div class="proxy-input-row">
          <input type="text" id="proxyAddr" placeholder="127.0.0.1" value="127.0.0.1">
          <span class="proxy-colon">:</span>
          <input type="number" id="proxyPort" placeholder="8445" value="8445">
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Import Ticket</h2>
      <textarea id="ticketInput" placeholder="Paste BEX ticket here..."></textarea>
      <button id="importBtn" class="btn btn-import">Import</button>
    </div>

    <div id="statusBar" class="status" style="display: none;"></div>

    <div class="section">
      <h2>Active Tickets</h2>
      <div id="ticketList" class="ticket-list">
        <p class="empty">No active tickets</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
